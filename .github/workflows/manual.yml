name: 'Generate and publish weekly link post'
on:
  schedule:
    - cron: 0 0 1 * *
  push:
    branches:
      - astro
jobs:
  generate-post:
    name: 'Run script to generate post'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run generate-links
        env:
          RAINDROP_API_KEY: ${{ secrets.RAINDROP_API_KEY }}
          RAINDROP_BOOKMARKS: ${{ secrets.RAINDROP_BOOKMARKS }}
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Generate weekly link post
